apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-exporter-storage
spec:
  capacity:
    storage: 16Ti
  accessModes:
    - ReadOnlyMany
  mountOptions:
    - nfsvers=4
    - hard
  nfs:
    server: 192.168.0.210
    path: /mnt/storage
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
