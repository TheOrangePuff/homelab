apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-data
spec:
  capacity:
    storage: 16Ti
  accessModes:
    - ReadWriteMany
  mountOptions:
    - nfsvers=4
    - hard
  nfs:
    server: 192.168.0.210
    path: /media
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: radarr-downloads
spec:
  capacity:
    storage: 16Ti
  accessModes:
    - ReadWriteMany
  mountOptions:
    - nfsvers=4
    - hard
  nfs:
    server: 192.168.0.210
    path: /media/Downloads
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
