apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: adguard
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`adguard.theorangeserver.net`)
      kind: Rule
      services:
        - name: adguard-primary
          port: 80
  tls:
    secretName: wildcard-certificate
