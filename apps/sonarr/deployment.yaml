apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: sonarr
        image: linuxserver/sonarr:4.0.16
        securityContext:
          readOnlyRootFilesystem: false
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /ping
            port: 8989
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /ping
            port: 8989
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        env:
        - name: TZ
          value: "Australia/Adelaide"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        ports:
        - name: web
          containerPort: 8989
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /config
        - name: data
          mountPath: /data
        - name: downloads
          mountPath: /downloads
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: sonarr
      - name: data
        persistentVolumeClaim:
          claimName: sonarr-data
      - name: downloads
        persistentVolumeClaim:
          claimName: sonarr-downloads
