apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: immich
  namespace: app
spec:
  entryPoints:
    - websecure
    - websecure-pub
  routes:
    - match: Host(`immich.theorangeserver.net`)
      kind: Rule
      middlewares:
        - name: immich-upload
      services:
        - name: immich-server
          port: 2283
  tls:
    secretName: wildcard-certificate
