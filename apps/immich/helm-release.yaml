apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: app
spec:
  interval: 1m
  chart:
    spec:
      chart: immich
      version: "0.10.3"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: app
  values:
    valkey:
      enabled: true

    immich:
      persistence:
        library:
          existingClaim: immich-library

    controllers:
      main:
        containers:
          main:
            env:
              DB_HOSTNAME: database
              DB_DATABASE_NAME: immich
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-credentials
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-credentials
                    key: DB_PASSWORD

    server:
      ingress:
        main:
          enabled: false

    machine-learning:
      persistence:
        cache:
          type: persistentVolumeClaim
          size: 10Gi
          storageClassName: longhorn
          accessMode: ReadWriteOnce
