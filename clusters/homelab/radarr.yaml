apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: radarr
  namespace: flux-system
spec:
  interval: 1m
  path: ./apps/radarr
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: media
  dependsOn:
    - name: media-namespace
    - name: traefik
    - name: longhorn
