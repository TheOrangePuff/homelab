apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unpackerr
  namespace: flux-system
spec:
  interval: 1m
  prune: true
  path: ./apps/unpackerr
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: media
  dependsOn:
    - name: media-namespace
    - name: sealed-secrets
    - name: radarr
