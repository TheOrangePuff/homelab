apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
  namespace: flux-system
spec:
  interval: 1m
  path: ./apps/immich
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: app
  dependsOn:
    - name: app-namespace
    - name: metallb
    - name: traefik
    - name: longhorn
