apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: adguard
  namespace: flux-system
spec:
  interval: 1m
  path: ./apps/adguard
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: infra
  dependsOn:
    - name: infra-namespace
    - name: traefik
    - name: longhorn
